---
_docker_packages:
  Debian:
    - docker.io
    - python3-docker
    - apparmor-utils
  RedHat:
    - moby-engine
  RedHat-7:
    - docker-io
  default:
    - docker
_docker_pip_packages:
  Debian: []
  default:
    - docker
_docker_service:
  RedHat: docker
  default: docker
docker_packages:
  "{{ _docker_packages[ansible_os_family ~ '-' ~ ansible_distribution_major_version] | default(_docker_packages[ansible_os_family] | default(_docker_packages['default']
  )) }}"
docker_pip_packages: "{{ _docker_pip_packages[ansible_os_family] | default(_docker_pip_packages['default']) }}"
docker_service: "{{ _docker_service[ansible_os_family] | default(_docker_service['default']) }}"
docker_socket: /var/run/docker.sock
