---
# Pins the CI platform/version matrix for this role. Without this, ansible-generator
# falls back to default_platforms and silently discards these choices on regenerate.
platforms:
  # EL excluded: this role has no repository-setup logic, so it only
  # works where the OS's own repos already carry a docker package
  # (Debian's docker.io, Fedora's moby-engine). RHEL/Rocky/AlmaLinux
  # never carried one; ansible-role-docker_ce handles that case.
  - name: Debian
    versions:
      - all
  - name: Fedora
    versions:
      # Excludes 45: it ships Python 3.15.0b3, whose dataclasses module
      # dropped _is_type, breaking ansible-core's AnsiballZ module wrapper.
      - "44"
      - "43"
  - name: Ubuntu
    versions:
      - all
